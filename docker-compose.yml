services:
  postgres:
    image: postgres:16-alpine
    container_name: footypartner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: footypartner
      POSTGRES_PASSWORD: footypartner
      POSTGRES_DB: footypartner
    ports:
      - '5432:5432'
    volumes:
      - footypartner_pg:/var/lib/postgresql/data

volumes:
  footypartner_pg:
