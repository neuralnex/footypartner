services:
  postgres:
    image: postgres:16-alpine
    container_name: football-pulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: football_pulse
    ports:
      - '5432:5432'
    volumes:
      - football_pulse_pg:/var/lib/postgresql/data

volumes:
  football_pulse_pg:
